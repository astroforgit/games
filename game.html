<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Drive: Midnight City</title>
    <style>
/* ======= src/style.css ======= */
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #010006;
            font-family: 'Press Start 2P', monospace;
            user-select: none;
        }

        /* CRT Filter Overlays */
        .crt::before {
            content: " "; display: block; position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10; background-size: 100% 4px, 6px 100%; pointer-events: none;
        }
        .crt::after {
            content: " "; display: block; position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.6) 100%);
            z-index: 11; pointer-events: none;
        }

        /* Rolling VHS Tracking Line */
        .vhs-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 8px;
            background: rgba(255,255,255,0.05);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1), 0 0 20px rgba(0, 243, 255, 0.1);
            animation: scan 6s linear infinite;
            z-index: 12; pointer-events: none; mix-blend-mode: overlay;
        }
        @keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }

        /* UI Overlays */
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            pointer-events: none;
        }
        
        #hud {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between;
            color: #00f3ff; text-shadow: 2px 2px 0 #ff007f, 0 0 10px #00f3ff;
            font-size: 1.5rem; opacity: 0; transition: opacity 0.5s; pointer-events: none;
        }

        .screen {
            background: rgba(5, 0, 20, 0.85); border: 4px solid #ff007f;
            padding: 40px; box-shadow: 0 0 30px #ff007f, inset 0 0 20px #ff007f;
            pointer-events: auto; backdrop-filter: blur(5px);
        }

        h1 { color: #ff007f; text-shadow: 3px 3px 0 #00f3ff, 0 0 20px #ff007f; margin-bottom: 10px; font-size: 2.5rem; }
        p { color: #fff; line-height: 1.8; margin-bottom: 30px; font-size: 0.9rem;}
        span.highlight { color: #ffcf00; text-shadow: 0 0 10px #ffcf00; }
        span.danger { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
        span.cyan { color: #00f3ff; text-shadow: 0 0 10px #00f3ff; }

        button {
            background: transparent; border: 2px solid #00f3ff;
            color: #00f3ff; font-family: inherit; font-size: 1.5rem;
            padding: 20px 40px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.5), inset 0 0 15px rgba(0, 243, 255, 0.5);
            transition: all 0.2s; pointer-events: auto;
        }
        button:hover { background: #00f3ff; color: #050014; box-shadow: 0 0 30px #00f3ff; transform: scale(1.05); }

        canvas { display: block; width: 100%; height: 100%; }
        
        @keyframes jitter {
            0% { transform: translateX(0); }
            10% { transform: translateX(-5px); }
            20% { transform: translateX(5px); }
            30% { transform: translateX(0); }
        }
        .hit-effect { animation: jitter 0.2s infinite; filter: hue-rotate(90deg) contrast(1.5); }

        /* ====== COMIC BOOK HUD (SANDRA) ====== */
        #commentator {
            position: absolute; top: 20px; right: 20px;
            display: flex; align-items: flex-start; justify-content: flex-end;
            pointer-events: none; z-index: 25;
            opacity: 0; transition: opacity 0.2s, transform 0.2s;
            transform: translateX(50px);
        }
        #commentator.show { opacity: 1; transform: translateX(0); }
        
        .bubble {
            background: #ffffff; color: #050014;
            border: 4px solid #00f3ff; border-radius: 15px;
            padding: 15px; font-size: 0.75rem; line-height: 1.4;
            max-width: 220px; text-transform: uppercase;
            box-shadow: 6px 6px 0px #ff00ff; font-weight: bold;
            position: relative; margin-right: 20px; margin-top: 10px;
        }
        .bubble::after {
            content: ''; position: absolute; right: -15px; top: 20px;
            border-width: 10px 0 10px 15px; border-style: solid;
            border-color: transparent transparent transparent #ffffff; z-index: 2;
        }
        .bubble::before {
            content: ''; position: absolute; right: -21px; top: 18px;
            border-width: 12px 0 12px 18px; border-style: solid;
            border-color: transparent transparent transparent #00f3ff; z-index: 1;
        }
        .portrait {
            width: 100px; height: 100px; background: #050014;
            border: 4px solid #ff00ff; border-radius: 8px;
            box-shadow: 0 0 20px #ff00ff; overflow: hidden; position: relative;
        }
        .portrait::before {
            content: ""; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 0, 255, 0.4), transparent);
            animation: shine 4s infinite linear;
        }
        @keyframes shine { 100% { left: 200%; } }
</style>
</head>
<body class="crt">
    
    <div class="vhs-line"></div>

    <!-- Sandra-inspired 80s Pop Singer Character -->
    <div id="commentator">
        <div class="bubble" id="comic-text">In the heat of the night, let's ride!</div>

                <circle cx="40" cy="47.5" r="2" fill="#00f3ff"/>
                
                <path d="M 67 48 Q 60 44 55 48 Q 60 51 67 48 Z" fill="#fff" stroke="#000" stroke-width="1.5"/>
                <circle cx="60" cy="47.5" r="2" fill="#00f3ff"/>
                
                <!-- Bright 80s Eyeshadow -->
                <path d="M 31 46 Q 39 39 47 46" stroke="#ff00ff" stroke-width="2.5" fill="none"/>
                <path d="M 69 46 Q 61 39 53 46" stroke="#00f3ff" stroke-width="2.5" fill="none"/>
                
                <!-- Thick 80s Eyebrows -->
                <path d="M 30 41 Q 39 36 46 41" stroke="#220011" stroke-width="2.5" fill="none"/>
                <path d="M 70 41 Q 61 36 54 41" stroke="#220011" stroke-width="2.5" fill="none"/>
                
                <!-- Elegant Nose -->
                <path d="M 50 48 L 50 62 L 53 64" stroke="#cc8877" stroke-width="1.5" fill="none"/>
                
                <!-- Plump Red Lips -->
                <path d="M 43 72 Q 50 68 57 72 Q 50 78 43 72 Z" fill="#ff0044"/>
                <line x1="44" y1="72" x2="56" y2="72" stroke="#770000" stroke-width="1"/>
                
                <!-- Big Golden Hoop Earrings -->
                <circle cx="28" cy="70" r="7" stroke="#ffcf00" stroke-width="2.5" fill="none"/>
                <circle cx="72" cy="70" r="7" stroke="#ffcf00" stroke-width="2.5" fill="none"/>
                
                <!-- Sweeping Textured Bangs (Hair over face) -->
                <path d="M 25 35 Q 35 20 52 28 Q 38 12 25 25 Z" fill="#3a003a"/>
                <path d="M 75 35 Q 65 20 48 28 Q 62 12 75 25 Z" fill="#3a003a"/>
                
                <!-- Wavy Neon Hair Highlights (Volume texture) -->
                <path d="M 12 50 Q 22 40 18 75" stroke="#ff00ff" stroke-width="1.5" fill="none"/>
                <path d="M 88 50 Q 78 40 82 75" stroke="#00f3ff" stroke-width="1.5" fill="none"/>
                <path d="M 28 15 Q 38 5 45 18" stroke="#ff00ff" stroke-width="1.5" fill="none"/>
                
                <!-- VHS Chromatic Glitch Overlay -->
                <path d="M 30 35 Q 26 65 50 85 Q 74 65 70 35 M 43 72 Q 50 68 57 72 Q 50 78 43 72" stroke="#ff0000" stroke-width="1.5" fill="none" transform="translate(-2, 0)" opacity="0.6"/>
                <path d="M 30 35 Q 26 65 50 85 Q 74 65 70 35 M 43 72 Q 50 68 57 72 Q 50 78 43 72" stroke="#00ffff" stroke-width="1.5" fill="none" transform="translate(2, 0)" opacity="0.6"/>
            </svg>
        </div>
    </div>

    <div id="ui">
        <div id="startScreen" class="screen">
            <h1>MIDNIGHT CITY</h1>
            <p>
               Steer: <span class="cyan">LEFT / RIGHT ARROWS</span><br>
               Accelerate: <span class="highlight">UP ARROW</span><br>
               Brake: <span class="danger">DOWN ARROW</span><br><br>
               Collect <span class="cyan">Atari</span> symbols.<br>
               Avoid <span class="danger">Glitching C64</span> hazards.
            </p>
            <button id="startBtn">INSERT COIN</button>
        </div>

        <div id="gameOverScreen" class="screen" style="display: none;">
            <h1>SYSTEM FAILURE</h1>
            <p>Final Score: <span id="finalScore" class="highlight">0</span></p>
            <button id="restartBtn">REBOOT SYSTEM</button>
        </div>
    </div>

    <div id="hud">
        <div>SCORE: <span id="scoreDisplay">0</span></div>
        <div>SPEED: <span id="speedDisplay">1.0</span>x</div>
    </div>

    <canvas id="gameCanvas"></canvas>

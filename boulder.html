    <style>
        body {
            background-color: #050510;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding-top: 2vh;
            user-select: none;
            overflow: hidden;
        }

        #game-wrapper {
            position: relative;
            border-radius: 12px;
            padding: 4px;
            background: linear-gradient(135deg, #2a2a35, #101018);
            box-shadow: 
                0 0 10px rgba(0,255,255,0.1), 
                0 0 30px rgba(0,255,255,0.2), 
                0 0 60px rgba(0,255,255,0.1),
                inset 0 0 20px #000;
        }

        canvas {
            display: block;
            border-radius: 8px;
            background-color: #000;
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.9);
        }

        #game-wrapper::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
            border-radius: 12px;
        }

        #ui {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 800px;
            margin-bottom: 15px;
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #0ff;
        }

        .highlight { color: #0ff; }
        .enemy-color { color: #f4a; }
        .c64-color { color: #dcb; }
        .ex-color { color: #f00; }
        .robo-color { color: #aaa; text-shadow: 0 0 5px #f00; }
        .crystal-color { color: #a0a; text-shadow: 0 0 5px #f0f; }
        .coal-color { color: #fa0; text-shadow: 0 0 5px #f00; }
        #status { text-shadow: 0 0 15px currentColor; }
        
        #instructions {
            margin-top: 15px;
            color: #aaa;
            text-align: center;
            font-size: 14px;
            line-height: 1.6;
            max-width: 800px;
            background: rgba(0,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(0,255,255,0.2);
        }
        strong { color: #fff; }
    </style>

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        
        window.addEventListener('click', initAudio, {once:true});
        window.addEventListener('keydown', initAudio, {once:true});

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'dig') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.1);
                gain.gain.setValueAtTime(0.05, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'diamond') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1200, now);
                osc.frequency.setValueAtTime(2000, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'thud') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(80, now);
                osc.frequency.exponentialRampToValueAtTime(20, now + 0.2);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'die') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(10, now + 0.7);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.7);
                osc.start(now); osc.stop(now + 0.7);
            } else if (type === 'win') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.setValueAtTime(554, now + 0.1);
                osc.frequency.setValueAtTime(659, now + 0.2);
                osc.frequency.setValueAtTime(880, now + 0.3);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.6);
                osc.start(now); osc.stop(now + 0.6);
            } else if (type === 'blip') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.05);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                osc.start(now); osc.stop(now + 0.05);
            } else if (type === 'laser') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.15);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'powerup') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.linearRampToValueAtTime(800, now + 0.4);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            } else if (type === 'glitch') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100 + Math.random()*800, now);
                osc.frequency.setValueAtTime(100 + Math.random()*800, now + 0.05);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            }
        }

        function tryStalkerMove(exTile, gx, gy, dx, dy) {
            if (dx === 0 && dy === 0) return false;
            let tx = gx + dx; let ty = gy + dy;
            let tTile = getTile(tx, ty);
            if (!tTile) return false;
            
            if (currentLevel === 5 && tTile.type === 'PLAYER') return false; 
            
            if (tTile.type === 'PLAYER' || tTile.type === 'CREEP' || tTile.type === 'C64_MONSTER' || tTile.type === 'EX' || tTile.type === 'ROBOCOP' || tTile.type === 'LASER' || tTile.type === 'ATARI_FURNACE' || tTile.type === 'COAL' || tTile.type === 'GLITCH') return false;

            if (tTile.type === 'SPACE' || tTile.type === 'DIRT' || tTile.type === 'BLACK_CRYSTAL') {
                if (tTile.type === 'DIRT') {
                    playSound('dig');
                    spawnParticles(tx + 0.5, ty + 0.5, '#A0522D', 8, 4);
                    
                    if (!exFreedCreep && exTile.type === 'EX') {
                        let dirs = [[0,-1],[1,0],[0,1],[-1,0]];
                        for(let d of dirs) {
                            let adj = getTile(tx+d[0], ty+d[1]);
                            if (adj && (adj.type === 'CREEP' || adj.type === 'C64_MONSTER')) {
                                exFreedCreep = true; break;
                            }
                        }
                    }
                } else if (tTile.type === 'BLACK_CRYSTAL') {
                    score = Math.max(0, score - 1); updateUI(); playSound('thud');
                    spawnParticles(tx + 0.5, ty + 0.5, '#a0a', 15, 6);
                    spawnText(tx, ty, "-1", "#f00");
                }
                swapTiles(gx, gy, tx, ty);
                exTile.lastTick = tick;
                return true;
            } else if (tTile.type === 'BOULDER' && dy === 0) {
                let behind = getTile(tx + dx, ty);
                if (behind && behind.type === 'SPACE') {
                    swapTiles(tx, ty, tx + dx, ty);
                    swapTiles(gx, gy, tx, ty);
                    exTile.lastTick = tick;
                    return true;
                }
            }
            return false;
        }

        function getNextStalkerMove(gx, gy, pTile, creeps, forcingFollow, exTile) {
            let goals = []; let isRobo = (exTile.type === 'ROBOCOP');

            gameMap.forEach((v, key) => {
                if (v.type === 'BLACK_CRYSTAL') {
                    let parts = key.split('_');
                    goals.push({x: parseInt(parts[0]), y: parseInt(parts[1]), prio: 1.5});
                }
            });
            
            if (pTile) {
                let px = pTile.gx, py = pTile.gy;
                if (isRobo) {
                    let dist = Math.abs(gx - px) + Math.abs(gy - py);
                    if (dist < 4) {
                        let dx = Math.sign(gx - px) || (Math.random()>0.5?1:-1);
                        let dy = Math.sign(gy - py) || (Math.random()>0.5?1:-1);
                        goals.push({x: gx + dx*4, y: gy + dy*4, prio: 1});
                    } else {
                        goals.push({x: px, y: py - 6, prio: 1}); goals.push({x: px, y: py + 6, prio: 1});
                        goals.push({x: px - 6, y: py, prio: 1}); goals.push({x: px + 6, y: py, prio: 1});
                    }
                } else {
                    if (forcingFollow) {
                        for(let dy=-3; dy<=3; dy++) {
                            for(let dx=-3; dx<=3; dx++) {
                                let d = Math.abs(dx) + Math.abs(dy);
                                if (d >= 2 && d <= 3) {
                                    let t = getTile(px+dx, py+dy);
                                    if (t && (t.type === 'SPACE' || t.type === 'DIRT' || t.type === 'BLACK_CRYSTAL')) goals.push({x: px+dx, y: py+dy, prio: 1});
                                }
                            }
                        }
                    } else {
                        let above = getTile(px, py - 1);
                        if (above && above.type === 'SPACE') {
                            let left = getTile(px - 1, py - 1);
                            if (left && left.type === 'BOULDER') goals.push({x: px - 2, y: py - 1, prio: 1, pushDir: 1});
                            let right = getTile(px + 1, py - 1);
                            if (right && right.type === 'BOULDER') goals.push({x: px + 2, y: py - 1, prio: 1, pushDir: -1});
                        }
                        if (!exFreedCreep) creeps.forEach(c => goals.push({x: c.gx, y: c.gy, prio: 2}));
                    }
                }
            }
            
            if (goals.length === 0) return null;
            
            for (let g of goals) {
                if (g.prio === 1 && gx === g.x && gy === g.y && g.pushDir) return {dx: g.pushDir, dy: 0};
            }
            
            let q = [{x: gx, y: gy, firstDir: null}];
            let visited = new Set(); visited.add(gx + "_" + gy);
            let dirs = [[0,-1], [1,0], [0,1], [-1,0]]; let iters = 0;
            
            while(q.length > 0 && iters < 500) {
                iters++; let cur = q.shift();
                for (let g of goals) {
                    if (g.prio === 1 && cur.x === g.x && cur.y === g.y) return cur.firstDir;
                    if ((g.prio === 2 || g.prio === 1.5) && Math.abs(cur.x - g.x) + Math.abs(cur.y - g.y) === 1) return cur.firstDir; 
                }
                
                for (let i = 0; i < dirs.length; i++) {
                    let dx = dirs[i][0]; let dy = dirs[i][1];
                    let nx = cur.x + dx; let ny = cur.y + dy;
                    let key = nx + "_" + ny;
                    let distToP = pTile ? Math.abs(nx - pTile.gx) + Math.abs(ny - pTile.gy) : 999;
                    
                    if (!visited.has(key)) {
                        visited.add(key);
                        let t = getTile(nx, ny);
                        if (t) {
                            let canWalk = (t.type === 'SPACE' || t.type === 'DIRT' || t.type === 'BLACK_CRYSTAL');
                            if (t.type === 'BOULDER' && dy === 0) {
                                let behind = getTile(nx + dx, ny);
                                if (behind && behind.type === 'SPACE') canWalk = true;
                            }
                            if (isRobo) {
                                let adjCreep = false;
                                for(let c of creeps) { if(Math.abs(nx - c.gx) + Math.abs(ny - c.gy) <= 2) adjCreep = true; }
                                if(adjCreep) canWalk = false;
                            }
                            if (!isRobo && distToP <= 1) canWalk = false; 
                            if (canWalk) q.push({ x: nx, y: ny, firstDir: cur.firstDir || {dx: dx, dy: dy} });
                        }
                    }
                }
            }
            return null;
        }

        function moveStalkers() {
            let stalkerList = []; let creeps = []; let pTile = null;
            
            gameMap.forEach((v, key) => { 
                let parts = key.split('_'); let gx = parseInt(parts[0]); let gy = parseInt(parts[1]);
                if(v.type === 'EX' || v.type === 'ROBOCOP') stalkerList.push({tile: v, gx: gx, gy: gy}); 
                if(v.type === 'CREEP' || v.type === 'C64_MONSTER') creeps.push({tile: v, gx: gx, gy: gy});
                if(v.type === 'PLAYER') pTile = {tile: v, gx: gx, gy: gy};
            });
            
            stalkerList.forEach(stalker => {
                if (stalker.tile.lastTick === tick) return;
                let isRobo = stalker.tile.type === 'ROBOCOP';

                let targetTile = pTile;
                
                if (currentLevel === 5) {
                    if (isRobo) {
                        let distToPlayer = pTile ? Math.abs(stalker.gx - pTile.gx) + Math.abs(stalker.gy - pTile.gy) : 0;
                        if (distToPlayer > 12) {
                            targetTile = pTile; // Stay on screen with player
                        } else {
                            let nearestGlitch = null; let minDist = 9999;
                            gameMap.forEach((v,k) => {
                                if(v.type === 'GLITCH') {
                                    let parts = k.split('_');
                                    let gx = parseInt(parts[0]), gy = parseInt(parts[1]);
                                    let d = Math.abs(stalker.gx - gx) + Math.abs(stalker.gy - gy);
                                    if(d < minDist) { minDist = d; nearestGlitch = {gx: gx, gy: gy}; }
                                }
                            });
                            targetTile = nearestGlitch || pTile; 
                        }
                    } else {
                        exWanderCounter = 5; 
                    }
                }

                if (isRobo) {
                    if (stalker.tile.cooldown > 0) stalker.tile.cooldown--;
                    if (stalker.tile.cooldown <= 0 && targetTile) {
                        let dx = 0, dy = 0;
                        if (targetTile.gx === stalker.gx) dy = Math.sign(targetTile.gy - stalker.gy);
                        else if (targetTile.gy === stalker.gy) dx = Math.sign(targetTile.gx - stalker.gx);
                        
                        if (dx !== 0 || dy !== 0) {
                            let clear = true; let tx = stalker.gx + dx, ty = stalker.gy + dy; let dist = 0;
                            while(tx !== targetTile.gx || ty !== targetTile.gy) {
                                let t = getTile(tx, ty);
                                if (!t || (t.type !== 'SPACE' && t.type !== 'DIRT' && t.type !== 'LASER' && t.type !== 'BLACK_CRYSTAL' && t.type !== 'GLITCH')) {
                                    clear = false; break;
                                }
                                tx += dx; ty += dy; dist++;
                            }
                            if (clear && dist > 0) {
                                let sx = stalker.gx + dx, sy = stalker.gy + dy; let st = getTile(sx, sy);
                                if (st && (st.type === 'SPACE' || st.type === 'DIRT' || st.type === 'BLACK_CRYSTAL' || st.type === 'GLITCH')) {
                                    if (st.type === 'BLACK_CRYSTAL') spawnParticles(sx + 0.5, sy + 0.5, '#a0a', 8, 4);
                                    playSound('laser');
                                    setTile(sx, sy, { type: 'LASER', dir: getDirFromDxDy(dx, dy), vx: sx, vy: sy, lastTick: tick, cooldown: 0 });
                                    stalker.tile.cooldown = (currentLevel === 5) ? 12 : 40; // High fire rate in L5
                                    stalker.tile.lastTick = tick;
                                    return; 
                                }
                            }
                        }
                    }
                }

                let distToP = targetTile ? (Math.abs(stalker.gx - targetTile.gx) + Math.abs(stalker.gy - targetTile.gy)) : 0;
                let isOffScreen = targetTile && (Math.abs(stalker.gx - (camX/ts + 12)) > 14 || Math.abs(stalker.gy - (camY/ts + 9)) > 10);
                
                if (!exMustFollow) exFollowTimer++;
                if (exFollowTimer > 61 || isOffScreen) exMustFollow = true;
                if (exMustFollow && distToP >= 2 && distToP <= 3 && !isOffScreen) {
                    exMustFollow = false; exFollowTimer = 0;
                }

                let currentPos = stalker.gx + "_" + stalker.gy;
                if (currentPos === exLastPos) exStuckCounter++;
                else { exStuckCounter = 0; exLastPos = currentPos; }
                if (exStuckCounter > 35) { exWanderCounter = 15; exStuckCounter = 0; }

                let moved = false;
                if (exWanderCounter > 0) {
                    exWanderCounter--;
                    let dirs = [[0,-1], [1,0], [0,1], [-1,0]]; dirs.sort(() => Math.random() - 0.5);
                    for (let d of dirs) {
                        let nx = stalker.gx + d[0]; let ny = stalker.gy + d[1];
                        let localDist = targetTile ? Math.abs(nx - targetTile.gx) + Math.abs(ny - targetTile.gy) : 999;
                        if (localDist > 1) {
                            if (isRobo) {
                                let adjCreep = false;
                                for(let c of creeps) { if(Math.abs(nx - c.gx) + Math.abs(ny - c.gy) <= 2) adjCreep = true; }
                                if(adjCreep) continue;
                            }
                            if (tryStalkerMove(stalker.tile, stalker.gx, stalker.gy, d[0], d[1])) { moved = true; break; }
                        }
                    }
                } else {
                    let move = getNextStalkerMove(stalker.gx, stalker.gy, targetTile, creeps, exMustFollow, stalker.tile);
                    if (move) moved = tryStalkerMove(stalker.tile, stalker.gx, stalker.gy, move.dx, move.dy);
                    else exWanderCounter = 3;
                }
            });
        }

        function update() {
            if (gameState !== 'PLAYING') return;
            tick++;

            if (spaceMashTimer > 0) {
                spaceMashTimer--;
                if (spaceMashTimer <= 0) spaceMashCount = 0;
            }

            let px = -1, py = -1;

                let glitchCount = 0;

                    let rx = Math.floor(Math.random() * cols);

            gameMap.forEach(function(tile, key) {

                                stalkerQuote.speaker = pr.type;

                                } else {
                                    stalkerQuote.text = pr.type === 'EX' 
                                        ? ["This is my LAST life!", "Commodore never dies!", "Did you miss me?!"][exRespawns]
                                        : ["CRITICAL BATTERY.", "OCP SPARE PARTS DEPLOYED.", "SYSTEM REBOOT SUCCESSFUL."][roboRespawns];
                                }

                }

            if (pTile) {

                if (dx === 0 && dy === 0) {
                    if (keys.get('ArrowUp')) dy = -1; else if (keys.get('ArrowDown')) dy = 1;

                    else if (keys.get('ArrowRight')) { dx = 1; facingLeft = false; }
                }

                    if (heroIdleTimer > 50 && playerQuote.life <= 0) {

                                setTile(tx, ty, { type: 'SPACE', vx: tx, vy: ty, lastTick: tick, cooldown: 0 });
                            } else if (target.type === 'COAL') {
                                if (playerCoal < 3) {
                                    playerCoal++; updateUI(); playSound('diamond');
                                    spawnParticles(tx + 0.5, ty + 0.5, '#444', 15, 6);
                                    spawnText(tx, ty, "COAL+1", "#888");
                                    setTile(tx, ty, { type: 'SPACE', vx: tx, vy: ty, lastTick: tick, cooldown: 0 });
                                } else { playSound('thud'); spawnText(tx, ty, "FULL!", "#f00"); }
                            } else if (target.type === 'BLACK_CRYSTAL') {
                                playSound('thud'); spawnParticles(tx + 0.5, ty + 0.5, '#a0a', 15, 6);
                                spawnText(tx, ty, "DENIED", "#a0a");
                                setTile(tx, ty, { type: 'SPACE', vx: tx, vy: ty, lastTick: tick, cooldown: 0 });
                            }
                        } else {
                            if (target.type === 'SPACE' || target.type === 'DIRT' || target.type === 'BLACK_CRYSTAL') {
                                if (target.type === 'DIRT') {
                                    playSound('dig'); spawnParticles(tx + 0.5, ty + 0.5, '#A0522D', 8, 4);
                                } else if (target.type === 'BLACK_CRYSTAL') {
                                    playSound('thud'); spawnParticles(tx + 0.5, ty + 0.5, '#a0a', 15, 6); spawnText(tx, ty, "DENIED", "#a0a");
                                }
                                swapTiles(px, py, tx, ty);
                            } else if (target.type === 'DIAMOND') {
                                score++; updateUI(); playSound('diamond');
                                spawnParticles(tx + 0.5, ty + 0.5, '#00FFFF', 15, 6); spawnText(tx, ty, "+100", "#00FFFF");
                                swapTiles(px, py, tx, ty);
                            } else if (target.type === 'COAL') {
                                if (playerCoal < 3) {
                                    playerCoal++; updateUI(); playSound('diamond');
                                    spawnParticles(tx + 0.5, ty + 0.5, '#444', 15, 6); spawnText(tx, ty, "COAL+1", "#888");
                                    swapTiles(px, py, tx, ty);
                                } else { playSound('thud'); spawnText(tx, ty, "FULL!", "#f00"); }
                            } else if (target.type === 'BOULDER' && dy === 0) {

                                if (behind && behind.type === 'SPACE') {

                                status.style.color = "#0f0";

                    }
                }
            }

            moveStalkers();

            for (let y = rows - 2; y >= 0; y--) {
                for (let x = 1; x < cols - 1; x++) {
                    let t = getTile(x, y);
                    if (!t || t.lastTick === tick) continue;

                    if (t.type === 'GLITCH') {
                        if (t.cooldown > 0) { t.cooldown--; t.lastTick = tick; continue; }
                        let dirs = [[0,-1], [1,0], [0,1], [-1,0]];
                        if (pTile && Math.random() < 0.6) {
                            dirs.sort((a,b) => {
                                let da = Math.abs(x+a[0]-pTile.gx) + Math.abs(y+a[1]-pTile.gy);
                                let db = Math.abs(x+b[0]-pTile.gx) + Math.abs(y+b[1]-pTile.gy);
                                return da - db;
                            });
                        } else {
                            dirs.sort(()=>Math.random()-0.5);
                        }
                        let moved = false;
                        for(let d of dirs) {
                            let nx = x + d[0], ny = y + d[1]; let nt = getTile(nx, ny);
                            if (nt) {
                                if (nt.type === 'PLAYER') {
                                    playSound('glitch'); explode(nx, ny); moved = true; break;
                                } else if (nt.type === 'SPACE' || nt.type === 'DIRT') {
                                    t.cooldown = (nt.type === 'DIRT') ? 4 : 1;
                                    if (nt.type === 'DIRT') spawnParticles(nx+0.5, ny+0.5, '#0f0', 5, 2);
                                    swapTiles(x, y, nx, ny); moved = true; break;
                                }
                            }
                        }
                        if(!moved) t.lastTick = tick;

                    if (t.type === 'LASER') {

                        let nx = x + delta.x; let ny = y + delta.y; let nTile = getTile(nx, ny);

                                if (nTile.type === 'BLACK_CRYSTAL') spawnParticles(nx + 0.5, ny + 0.5, '#a0a', 8, 4);
                                setTile(nx, ny, t); setTile(x, y, {type: 'SPACE', vx: x, vy: y, cooldown: 0});
                                t.lastTick = tick;
                            } else if (nTile.type === 'PLAYER' || nTile.type === 'EX' || nTile.type === 'ROBOCOP') {
                                if (currentLevel === 5) {
                                    setTile(x, y, {type: 'SPACE', vx: x, vy: y, cooldown: 0});
                                    spawnParticles(nx + 0.5, ny + 0.5, '#00f', 10, 5);
                                } else {
                                    explode(nx, ny); setTile(x, y, {type: 'SPACE', vx: x, vy: y, cooldown: 0});
                                }

                                setTile(x, y, {type: 'SPACE', vx: x, vy: y, cooldown: 0});
                            } else if (nTile.type === 'CREEP' || nTile.type === 'C64_MONSTER') {
                                explode(nx, ny); setTile(x, y, {type: 'SPACE', vx: x, vy: y, cooldown: 0});
                            } else if (nTile.type === 'LASER') {
                                setTile(nx, ny, {type: 'SPACE', vx: nx, vy: ny, cooldown: 0});
                                setTile(x, y, {type: 'SPACE', vx: x, vy: y, cooldown: 0});
                                spawnParticles(nx + 0.5, ny + 0.5, '#f00', 10, 5);
                            } else { 
                                setTile(x, y, {type: 'SPACE', vx: x, vy: y, cooldown: 0});
                                spawnParticles(nx + 0.5, ny + 0.5, '#f00', 10, 5); playSound('thud');
                            }
                        }
                    }
                    
                    if (t.type === 'CREEP' || t.type === 'C64_MONSTER') {
                        let currentDir = t.dir; let rightDir = (currentDir + 1) % 4; let leftDir = (currentDir + 3) % 4;
                        let rightDelta = getDirDelta(rightDir); let frontDelta = getDirDelta(currentDir);
                        let rightTile = getTile(x + rightDelta.x, y + rightDelta.y);
                        let frontTile = getTile(x + frontDelta.x, y + frontDelta.y);

                        if (rightTile && (rightTile.type === 'SPACE' || rightTile.type === 'PLAYER' || rightTile.type === 'ROBOCOP')) {
                            if (currentLevel !== 5 && (rightTile.type === 'PLAYER' || rightTile.type === 'ROBOCOP')) explode(x + rightDelta.x, y + rightDelta.y);

                        } else if (frontTile && (frontTile.type === 'SPACE' || frontTile.type === 'PLAYER' || frontTile.type === 'ROBOCOP')) {
                            if (currentLevel !== 5 && (frontTile.type === 'PLAYER' || frontTile.type === 'ROBOCOP')) explode(x + frontDelta.x, y + frontDelta.y);
                            else if (frontTile.type === 'SPACE') swapTiles(x, y, x + frontDelta.x, y + frontDelta.y);
                        } else {
                            t.dir = leftDir; t.lastTick = tick; 
                        }
                    }
                    
                    if (t.type === 'BOULDER' || t.type === 'DIAMOND' || t.type === 'BLACK_CRYSTAL' || t.type === 'COAL') {
                        let b = getTile(x, y + 1);
                        if (t.falling && b && b.type !== 'SPACE') {
                            if (b.type === 'PLAYER' || b.type === 'CREEP' || b.type === 'C64_MONSTER' || b.type === 'EX' || b.type === 'ROBOCOP') {
                                explode(x, y + 1);
                            } else if (b.type === 'GLITCH') {
                                explodeGlitch(x, y + 1);
                            } else if (t.type === 'BOULDER' || t.type === 'BLACK_CRYSTAL' || t.type === 'COAL') {
                                playSound('thud'); screenShake = 5;
                                spawnParticles(x + 0.5, y + 1, '#888', 6, 2);
                            }
                        }

                        if (b && b.type === 'SPACE') {
                            t.falling = true; swapTiles(x, y, x, y + 1);
                        } else if (b && (b.type === 'BOULDER' || b.type === 'DIAMOND' || b.type === 'BLACK_CRYSTAL' || b.type === 'COAL' || b.type === 'WALL')) {
                            let left = getTile(x - 1, y), bLeft = getTile(x - 1, y + 1);
                            let right = getTile(x + 1, y), bRight = getTile(x + 1, y + 1);

                            if (left && left.type === 'SPACE' && bLeft && bLeft.type === 'SPACE') {
                                t.falling = true; swapTiles(x, y, x - 1, y);
                            } else if (right && right.type === 'SPACE' && bRight && bRight.type === 'SPACE') {
                                t.falling = true; swapTiles(x, y, x + 1, y);
                            } else { t.falling = false; }
                        } else { t.falling = false; }
                    }
                }
            }
        }

        function drawBubble(text, screenX, screenY) {
            let words = text.split(' '); let lines = []; let line = '';
            ctx.font = 'bold 16px Courier New, Courier, monospace';
            for(let n = 0; n < words.length; n++) {
                let testLine = line + words[n] + ' '; let metrics = ctx.measureText(testLine);
                if (metrics.width > 200 && n > 0) { lines.push(line); line = words[n] + ' '; } else { line = testLine; }
            }
            lines.push(line);
            
            let bubbleHeight = lines.length * 20 + 30; let bubbleWidth = 240;
            let drawBelow = screenY < (bubbleHeight + 40);
            let minX = (bubbleWidth / 2) + 10; let maxX = canvas.width - (bubbleWidth / 2) - 10;
            let bCX = Math.max(minX, Math.min(screenX, maxX));
            let bCY = drawBelow ? screenY + bubbleHeight/2 + 20 : screenY - bubbleHeight/2 - 20;
            bCY += Math.sin(Date.now() / 150) * 4;

            ctx.save();
            ctx.fillStyle = '#fff'; ctx.strokeStyle = '#f09'; ctx.lineWidth = 3;

            ctx.globalAlpha = 1.0; ctx.shadowBlur = 0;
            ctx.restore();

            // Draw Dialog UI
            if (gameState === 'DIALOG') {
                ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                let current = dialogs[dialogIndex]; let speakerWorldX = 0, speakerWorldY = 0;
                gameMap.forEach(v => {
                    if (v.type === current.speaker) { speakerWorldX = (v.vx * ts) + ts/2; speakerWorldY = (v.vy * ts) - 10; }
                });
                let screenX = speakerWorldX - Math.floor(camX); let screenY = speakerWorldY - Math.floor(camY);
                drawBubble(current.text, screenX, screenY);
            }
        }

        let lastLogicTime = 0;
        const TICK_RATE = 130; 
        
        function gameLoop(timestamp) {
            if (!lastLogicTime) lastLogicTime = timestamp;
            while (timestamp - lastLogicTime >= TICK_RATE) {
                update();
                lastLogicTime += TICK_RATE;
            }
            if (glitchTimer > 0) glitchTimer--;
            render();
            requestAnimationFrame(gameLoop);
        }

        initGame();
        requestAnimationFrame(gameLoop);

    </script>
</body>
</html>
